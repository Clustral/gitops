apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: teleport
  namespace: teleport
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: teleport
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: letsencrypt-ca
    hostname: teleport.kube.it.com