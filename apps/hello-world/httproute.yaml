apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world
  namespace: hello-world
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway
  hostnames:
    - hello-world.kube.it.com
  rules:
    - backendRefs:
        - name: hello-world
          port: 80
