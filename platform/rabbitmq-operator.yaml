apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: rabbitmq-cluster-operator
    targetRevision: 4.3.18
    helm:
      values: |
        clusterOperator:
          image:
            registry: docker.io
            repository: rabbitmqoperator/cluster-operator
            tag: "v2.9.0"
        msgTopologyOperator:
          enabled: true
          image:
            registry: docker.io
            repository: rabbitmqoperator/messaging-topology-operator-with-certmanager
            tag: "v1.13.0"
        useCertManager: true
  destination:
    server: https://kubernetes.default.svc
    namespace: rabbitmq-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true