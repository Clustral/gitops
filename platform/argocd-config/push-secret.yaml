apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: argocd-initial-admin-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: doppler
      kind: ClusterSecretStore
  selector:
    secret:
      name: argocd-initial-admin-secret
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: ARGOCD_ADMIN_PASSWORD